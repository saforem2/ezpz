<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 640" style="font-family:'Iosevka Web',monospace,system-ui,sans-serif;font-size:13px">
  <!-- Legend -->
  <rect x="20" y="10" width="16" height="12" rx="2" fill="#4caf50"/>
  <text x="42" y="20" fill="#aaa">Parameters (4 GB)</text>
  <rect x="180" y="10" width="16" height="12" rx="2" fill="#ff9800"/>
  <text x="202" y="20" fill="#aaa">Gradients (4 GB)</text>
  <rect x="330" y="10" width="16" height="12" rx="2" fill="#2196f3"/>
  <text x="352" y="20" fill="#aaa">Optimizer States (8 GB)</text>
  <text x="20" y="40" font-size="11" fill="#888">Bar widths are proportional to memory (1B params, fp32, Adam → 4 + 4 + 8 = 16 GB)</text>

  <!-- ═══════════ Baseline / DDP ═══════════ -->
  <text x="20" y="75" font-weight="bold" font-size="14" fill="#aaa">Baseline (DDP) — no sharding</text>

  <text x="20" y="98" font-size="11" fill="#aaa">GPU 0</text>
  <rect x="70"  y="86" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="86" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="86" width="320" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="120" font-size="11" fill="#aaa">GPU 1</text>
  <rect x="70"  y="108" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="108" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="108" width="320" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="142" font-size="11" fill="#aaa">GPU N</text>
  <rect x="70"  y="130" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="130" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="130" width="320" height="16" rx="3" fill="#2196f3"/>

  <!-- Divider -->
  <line x1="20" y1="160" x2="710" y2="160" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4"/>

  <!-- ═══════════ ZeRO-1 / SHARD_OPTIM ═══════════ -->
  <text x="20" y="185" font-weight="bold" font-size="14" fill="#aaa">ZeRO-1 — shard optimizer states</text>

  <text x="20" y="208" font-size="11" fill="#aaa">GPU 0</text>
  <rect x="70"  y="196" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="196" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="196" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="390" y="196" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="230" font-size="11" fill="#aaa">GPU 1</text>
  <rect x="70"  y="218" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="218" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="218" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="497" y="218" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="252" font-size="11" fill="#aaa">GPU N</text>
  <rect x="70"  y="240" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="240" width="160" height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="240" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="604" y="240" width="106" height="16" rx="3" fill="#2196f3"/>

  <!-- Divider -->
  <line x1="20" y1="270" x2="710" y2="270" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4"/>

  <!-- ═══════════ ZeRO-2 ═══════════ -->
  <text x="20" y="295" font-weight="bold" font-size="14" fill="#aaa">ZeRO-2 — shard optimizer states + gradients</text>

  <text x="20" y="318" font-size="11" fill="#aaa">GPU 0</text>
  <rect x="70"  y="306" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="306" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="230" y="306" width="54"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="306" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="390" y="306" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="340" font-size="11" fill="#aaa">GPU 1</text>
  <rect x="70"  y="328" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="328" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="284" y="328" width="54"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="328" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="497" y="328" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="362" font-size="11" fill="#aaa">GPU N</text>
  <rect x="70"  y="350" width="160" height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="350" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="338" y="350" width="52"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="350" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="604" y="350" width="106" height="16" rx="3" fill="#2196f3"/>

  <!-- Divider -->
  <line x1="20" y1="380" x2="710" y2="380" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4"/>

  <!-- ═══════════ ZeRO-3 / FULL_SHARD ═══════════ -->
  <text x="20" y="405" font-weight="bold" font-size="14" fill="#aaa">ZeRO-3 (FULL_SHARD) — shard everything</text>

  <text x="20" y="428" font-size="11" fill="#aaa">GPU 0</text>
  <rect x="70"  y="416" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="70"  y="416" width="54"  height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="416" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="230" y="416" width="54"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="416" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="390" y="416" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="450" font-size="11" fill="#aaa">GPU 1</text>
  <rect x="70"  y="438" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="124" y="438" width="54"  height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="438" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="284" y="438" width="54"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="438" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="497" y="438" width="107" height="16" rx="3" fill="#2196f3"/>

  <text x="20" y="472" font-size="11" fill="#aaa">GPU N</text>
  <rect x="70"  y="460" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="178" y="460" width="52"  height="16" rx="3" fill="#4caf50"/>
  <rect x="230" y="460" width="160" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="338" y="460" width="52"  height="16" rx="3" fill="#ff9800"/>
  <rect x="390" y="460" width="320" height="16" rx="3" fill="#888" fill-opacity="0.1"/>
  <rect x="604" y="460" width="106" height="16" rx="3" fill="#2196f3"/>

  <!-- ═══════════ Summary ═══════════ -->
  <line x1="20" y1="492" x2="710" y2="492" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4"/>

  <text x="20" y="520" font-size="12" fill="#aaa">Per-GPU memory (1B params in float32, N GPUs):</text>
  <text x="20" y="542" font-size="12" fill="#aaa">  Baseline = Params + Grads + Optim         = <tspan font-weight="bold">16 GB</tspan></text>
  <text x="20" y="562" font-size="12" fill="#aaa">  ZeRO-1   = Params + Grads + Optim/N       = <tspan font-weight="bold">8 + 8/N GB</tspan></text>
  <text x="20" y="582" font-size="12" fill="#aaa">  ZeRO-2   = Params + Grads/N + Optim/N     = <tspan font-weight="bold">4 + 12/N GB</tspan></text>
  <text x="20" y="602" font-size="12" fill="#aaa">  ZeRO-3   = Params/N + Grads/N + Optim/N   = <tspan font-weight="bold">16/N GB</tspan></text>

  <text x="20" y="630" font-size="11" fill="#888">ezpz: reshard_after_forward=False → ZeRO-2, reshard_after_forward=True → ZeRO-3</text>
</svg>
